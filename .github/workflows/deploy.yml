name: Deploy Fullstack

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: Deploy To VM
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    env:
      DEPLOY_HOST: ${{ secrets.PROD_SSH_HOST != '' && secrets.PROD_SSH_HOST || secrets.AWS_EC2_HOST != '' && secrets.AWS_EC2_HOST || secrets.ORACLE_VM_IP != '' && secrets.ORACLE_VM_IP || secrets.DOMAIN != '' && secrets.DOMAIN || 'api.huyhoang05.id.vn' }}
      DEPLOY_PORT: ${{ secrets.PROD_SSH_PORT != '' && secrets.PROD_SSH_PORT || secrets.SSH_PORT != '' && secrets.SSH_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.PROD_SSH_USER != '' && secrets.PROD_SSH_USER || secrets.AWS_EC2_USER != '' && secrets.AWS_EC2_USER || secrets.ORACLE_VM_USER != '' && secrets.ORACLE_VM_USER || secrets.DEPLOY_USER != '' && secrets.DEPLOY_USER || 'ubuntu' }}
      DEPLOY_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY != '' && secrets.PROD_SSH_PRIVATE_KEY || secrets.AWS_EC2_SSH_PRIVATE_KEY != '' && secrets.AWS_EC2_SSH_PRIVATE_KEY || secrets.ORACLE_SSH_PRIVATE_KEY != '' && secrets.ORACLE_SSH_PRIVATE_KEY || secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH != '' && secrets.PROD_DEPLOY_PATH || secrets.AWS_DEPLOY_PATH != '' && secrets.AWS_DEPLOY_PATH || secrets.DEPLOY_PATH != '' && secrets.DEPLOY_PATH || '/home/ubuntu/CollabWorkspacePlatform' }}
      DOMAIN: ${{ secrets.PROD_DOMAIN != '' && secrets.PROD_DOMAIN || secrets.DOMAIN }}
      CERTBOT_EMAIL: ${{ secrets.PROD_CERTBOT_EMAIL != '' && secrets.PROD_CERTBOT_EMAIL || secrets.CERTBOT_EMAIL }}
      GOOGLE_CLIENT_ID: ${{ secrets.PROD_GOOGLE_CLIENT_ID != '' && secrets.PROD_GOOGLE_CLIENT_ID || secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.PROD_GOOGLE_CLIENT_SECRET != '' && secrets.PROD_GOOGLE_CLIENT_SECRET || secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REDIRECT_URI: ${{ secrets.PROD_GOOGLE_REDIRECT_URI != '' && secrets.PROD_GOOGLE_REDIRECT_URI || secrets.GOOGLE_REDIRECT_URI }}
      GOOGLE_SCOPES: ${{ secrets.PROD_GOOGLE_SCOPES != '' && secrets.PROD_GOOGLE_SCOPES || secrets.GOOGLE_SCOPES }}
      FRONTEND_API_BASE_URL: ${{ secrets.PROD_FRONTEND_API_BASE_URL != '' && secrets.PROD_FRONTEND_API_BASE_URL || secrets.FRONTEND_API_BASE_URL }}
      FRONTEND_URL: ${{ secrets.PROD_FRONTEND_URL != '' && secrets.PROD_FRONTEND_URL || secrets.FRONTEND_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node for frontend build
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend assets
        working-directory: frontend
        run: |
          set -euo pipefail

          if [ -n "${FRONTEND_API_BASE_URL}" ]; then
            echo "Using FRONTEND_API_BASE_URL from secret"
            printf 'VITE_API_BASE_URL=%s\n' "${FRONTEND_API_BASE_URL}" > .env.production.local
          elif [ -f .env.example ]; then
            echo "FRONTEND_API_BASE_URL not set; fallback to frontend/.env.example"
            cp .env.example .env.production.local
          else
            echo '::error::Missing FRONTEND_API_BASE_URL secret and frontend/.env.example not found'
            exit 1
          fi

          npm ci
          npm run build

      - name: Preflight deploy secrets
        run: |
          set -euo pipefail
          [ -n "${DEPLOY_HOST}" ] || { echo "::error::Missing deploy host secret (prefer PROD_SSH_HOST)"; exit 1; }
          [ -n "${DEPLOY_PORT}" ] || { echo "::error::Missing deploy SSH port secret (prefer PROD_SSH_PORT)"; exit 1; }
          [ -n "${DEPLOY_USER}" ] || { echo "::error::Missing deploy user secret (prefer PROD_SSH_USER)"; exit 1; }
          [ -n "${DEPLOY_KEY}" ] || { echo "::error::Missing deploy private key secret (prefer PROD_SSH_PRIVATE_KEY)"; exit 1; }
          [ -n "${DEPLOY_PATH}" ] || { echo "::error::Missing deploy path secret (prefer PROD_DEPLOY_PATH)"; exit 1; }
          [ -n "${FRONTEND_API_BASE_URL}" ] || { echo "::error::Missing frontend API base URL secret (prefer PROD_FRONTEND_API_BASE_URL)"; exit 1; }
          [ -n "${FRONTEND_URL}" ] || { echo "::error::Missing frontend origin secret (prefer PROD_FRONTEND_URL)"; exit 1; }

          missing_google=0
          for key in GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET GOOGLE_REDIRECT_URI GOOGLE_SCOPES; do
            if [ -z "${!key}" ]; then
              echo "::warning::${key} is empty. Google integration may fail at runtime."
              missing_google=1
            fi
          done

          if [ "${missing_google}" -eq 1 ]; then
            echo "::warning::Set PROD_GOOGLE_CLIENT_ID/PROD_GOOGLE_CLIENT_SECRET/PROD_GOOGLE_REDIRECT_URI/PROD_GOOGLE_SCOPES to keep production deterministic."
          fi

      - name: Preflight network reachability
        run: |
          set -euo pipefail
          echo "Checking SSH reachability to ${DEPLOY_HOST}:${DEPLOY_PORT}"
          if ! timeout 15 bash -lc "cat < /dev/null > /dev/tcp/${DEPLOY_HOST}/${DEPLOY_PORT}"; then
            echo "::error::Cannot reach ${DEPLOY_HOST}:${DEPLOY_PORT} from GitHub runner. Check VM uptime, security group/firewall inbound rule, and SSH port secret."
            exit 1
          fi

      - name: Prepare SSH for deploy copy
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "${DEPLOY_KEY}" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"

      - name: Copy project to VM
        run: |
          set -euo pipefail

          [ -d backend ] || { echo '::error::backend directory not found in workspace'; exit 1; }
          [ -f frontend/nginx.frontend.conf ] || { echo '::error::frontend/nginx.frontend.conf not found'; exit 1; }
          [ -f frontend/dist/index.html ] || { echo '::error::frontend/dist/index.html not found after frontend build'; exit 1; }

          tar -czf /tmp/deploy-bundle.tgz backend frontend/dist frontend/nginx.frontend.conf

          scp \
            -i "$HOME/.ssh/deploy_key" \
            -P "${DEPLOY_PORT}" \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=accept-new \
            /tmp/deploy-bundle.tgz \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/deploy-bundle.tgz"

          ssh \
            -i "$HOME/.ssh/deploy_key" \
            -p "${DEPLOY_PORT}" \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p '${DEPLOY_PATH}' && tar -xzf /tmp/deploy-bundle.tgz -C '${DEPLOY_PATH}' && rm -f /tmp/deploy-bundle.tgz"

          rm -f /tmp/deploy-bundle.tgz

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          port: ${{ env.DEPLOY_PORT }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}/backend
            if [ ! -f .env ]; then
              echo '.env not found on server. Create backend/.env before first deploy.'
              exit 1
            fi

            upsert_env() {
              key="$1"
              value="$2"

              if [ -z "$value" ]; then
                return
              fi

              tmp_file=$(mktemp)
              awk -v key="$key" -v value="$value" '
                BEGIN { updated = 0 }
                $0 ~ ("^" key "=") {
                  print key "=" value
                  updated = 1
                  next
                }
                { print }
                END {
                  if (!updated) {
                    print key "=" value
                  }
                }
              ' .env > "$tmp_file"
              mv "$tmp_file" .env
            }

            upsert_env "GOOGLE_CLIENT_ID" "${{ env.GOOGLE_CLIENT_ID }}"
            upsert_env "GOOGLE_CLIENT_SECRET" "${{ env.GOOGLE_CLIENT_SECRET }}"
            upsert_env "GOOGLE_REDIRECT_URI" "${{ env.GOOGLE_REDIRECT_URI }}"
            upsert_env "GOOGLE_SCOPES" "${{ env.GOOGLE_SCOPES }}"
            upsert_env "FRONTEND_URL" "${{ env.FRONTEND_URL }}"

            if [ ! -f ../frontend/dist/index.html ]; then
              echo 'Frontend build artifact not found at frontend/dist/index.html'
              exit 1
            fi

            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            # Run DB migrations using compiled datasource in production image.
            docker compose -f docker-compose.prod.yml exec -T backend npx typeorm -d dist/config/typeorm-cli.config.js migration:run

            # Wait for healthy backend before finishing deploy.
            for i in $(seq 1 20); do
              if docker compose -f docker-compose.prod.yml exec -T backend wget -qO- http://localhost:3000/health >/dev/null; then
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo 'Backend health check failed after deploy.'
                exit 1
              fi
              sleep 3
            done

            for i in $(seq 1 20); do
              if docker compose -f docker-compose.prod.yml exec -T nginx wget -qO- http://localhost/ >/dev/null; then
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo 'Nginx frontend health check failed after deploy.'
                exit 1
              fi
              sleep 3
            done

            # Optional HTTPS bootstrap (runs only when both secrets are set)
            if [ -n "${{ env.DOMAIN }}" ] && [ -n "${{ env.CERTBOT_EMAIL }}" ]; then
              export DOMAIN="${{ env.DOMAIN }}"
              export CERTBOT_EMAIL="${{ env.CERTBOT_EMAIL }}"
              sh scripts/enable-https.sh
              sh scripts/renew-ssl.sh || true
            fi

            # Remove legacy poll deploy cron after a successful Actions deploy.
            current_cron="$(crontab -l 2>/dev/null || true)"
            if printf '%s\n' "$current_cron" | grep -q 'poll-deploy.sh'; then
              updated_cron="$(printf '%s\n' "$current_cron" | grep -v 'poll-deploy.sh' || true)"
              if [ -n "$(printf '%s' "$updated_cron" | tr -d '[:space:]')" ]; then
                printf '%s\n' "$updated_cron" | crontab -
              else
                crontab -r || true
              fi
              echo 'Removed legacy poll-deploy.sh cron entry.'
            else
              echo 'No legacy poll-deploy.sh cron entry found.'
            fi

            docker image prune -f

# Required repository secrets:
# Canonical production secrets (recommended):
# PROD_SSH_HOST
# PROD_SSH_PORT (optional, defaults to 22)
# PROD_SSH_USER
# PROD_SSH_PRIVATE_KEY
# PROD_DEPLOY_PATH
# PROD_FRONTEND_API_BASE_URL
# PROD_FRONTEND_URL
# PROD_GOOGLE_CLIENT_ID
# PROD_GOOGLE_CLIENT_SECRET
# PROD_GOOGLE_REDIRECT_URI
# PROD_GOOGLE_SCOPES
# Optional TLS:
# PROD_DOMAIN
# PROD_CERTBOT_EMAIL
#
# Legacy fallback secrets are still supported during migration:
# AWS_EC2_HOST, AWS_EC2_USER, AWS_EC2_SSH_PRIVATE_KEY, AWS_DEPLOY_PATH
# ORACLE_VM_IP, ORACLE_VM_USER, ORACLE_SSH_PRIVATE_KEY, DEPLOY_PATH, DEPLOY_USER, SSH_PORT
# DOMAIN, CERTBOT_EMAIL
# GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GOOGLE_REDIRECT_URI, GOOGLE_SCOPES
# FRONTEND_API_BASE_URL, FRONTEND_URL
