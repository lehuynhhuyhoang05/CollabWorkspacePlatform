name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: Deploy To VM
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    env:
      DEPLOY_HOST: ${{ secrets.AWS_EC2_HOST != '' && secrets.AWS_EC2_HOST || secrets.ORACLE_VM_IP }}
      DEPLOY_USER: ${{ secrets.AWS_EC2_USER != '' && secrets.AWS_EC2_USER || secrets.ORACLE_VM_USER }}
      DEPLOY_KEY: ${{ secrets.AWS_EC2_SSH_PRIVATE_KEY != '' && secrets.AWS_EC2_SSH_PRIVATE_KEY || secrets.ORACLE_SSH_PRIVATE_KEY }}
      DEPLOY_PATH: ${{ secrets.AWS_DEPLOY_PATH != '' && secrets.AWS_DEPLOY_PATH || secrets.DEPLOY_PATH }}
      DOMAIN: ${{ secrets.DOMAIN }}
      CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
      GOOGLE_SCOPES: ${{ secrets.GOOGLE_SCOPES }}
      FRONTEND_API_BASE_URL: ${{ secrets.FRONTEND_API_BASE_URL }}
      FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node for frontend build
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend assets
        working-directory: frontend
        run: |
          set -euo pipefail

          if [ -n "${FRONTEND_API_BASE_URL}" ]; then
            echo "Using FRONTEND_API_BASE_URL from secret"
            printf 'VITE_API_BASE_URL=%s\n' "${FRONTEND_API_BASE_URL}" > .env.production.local
          elif [ -f .env.example ]; then
            echo "FRONTEND_API_BASE_URL not set; fallback to frontend/.env.example"
            cp .env.example .env.production.local
          else
            echo '::error::Missing FRONTEND_API_BASE_URL secret and frontend/.env.example not found'
            exit 1
          fi

          npm ci
          npm run build

      - name: Preflight deploy secrets
        run: |
          set -euo pipefail
          [ -n "${DEPLOY_HOST}" ] || { echo "::error::Missing AWS_EC2_HOST or ORACLE_VM_IP"; exit 1; }
          [ -n "${DEPLOY_USER}" ] || { echo "::error::Missing AWS_EC2_USER or ORACLE_VM_USER"; exit 1; }
          [ -n "${DEPLOY_KEY}" ] || { echo "::error::Missing AWS_EC2_SSH_PRIVATE_KEY or ORACLE_SSH_PRIVATE_KEY"; exit 1; }
          [ -n "${DEPLOY_PATH}" ] || { echo "::error::Missing AWS_DEPLOY_PATH or DEPLOY_PATH"; exit 1; }

      - name: Copy project to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          source: 'backend/**,frontend/dist/**,frontend/nginx.frontend.conf'
          target: '${{ env.DEPLOY_PATH }}'
          strip_components: 0

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}/backend
            if [ ! -f .env ]; then
              echo '.env not found on server. Create backend/.env before first deploy.'
              exit 1
            fi

            upsert_env() {
              key="$1"
              value="$2"

              if [ -z "$value" ]; then
                return
              fi

              tmp_file=$(mktemp)
              awk -v key="$key" -v value="$value" '
                BEGIN { updated = 0 }
                $0 ~ ("^" key "=") {
                  print key "=" value
                  updated = 1
                  next
                }
                { print }
                END {
                  if (!updated) {
                    print key "=" value
                  }
                }
              ' .env > "$tmp_file"
              mv "$tmp_file" .env
            }

            upsert_env "GOOGLE_CLIENT_ID" "${{ env.GOOGLE_CLIENT_ID }}"
            upsert_env "GOOGLE_CLIENT_SECRET" "${{ env.GOOGLE_CLIENT_SECRET }}"
            upsert_env "GOOGLE_REDIRECT_URI" "${{ env.GOOGLE_REDIRECT_URI }}"
            upsert_env "GOOGLE_SCOPES" "${{ env.GOOGLE_SCOPES }}"
            upsert_env "FRONTEND_URL" "${{ env.FRONTEND_URL }}"

            if [ ! -f ../frontend/dist/index.html ]; then
              echo 'Frontend build artifact not found at frontend/dist/index.html'
              exit 1
            fi

            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            # Run DB migrations using compiled datasource in production image.
            docker compose -f docker-compose.prod.yml exec -T backend npx typeorm -d dist/config/typeorm-cli.config.js migration:run

            # Wait for healthy backend before finishing deploy.
            for i in $(seq 1 20); do
              if docker compose -f docker-compose.prod.yml exec -T backend wget -qO- http://localhost:3000/health >/dev/null; then
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo 'Backend health check failed after deploy.'
                exit 1
              fi
              sleep 3
            done

            for i in $(seq 1 20); do
              if docker compose -f docker-compose.prod.yml exec -T nginx wget -qO- http://localhost/ >/dev/null; then
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo 'Nginx frontend health check failed after deploy.'
                exit 1
              fi
              sleep 3
            done

            # Optional HTTPS bootstrap (runs only when both secrets are set)
            if [ -n "${{ env.DOMAIN }}" ] && [ -n "${{ env.CERTBOT_EMAIL }}" ]; then
              export DOMAIN="${{ env.DOMAIN }}"
              export CERTBOT_EMAIL="${{ env.CERTBOT_EMAIL }}"
              sh scripts/enable-https.sh
              sh scripts/renew-ssl.sh || true
            fi

            docker image prune -f

# Required repository secrets:
# AWS_EC2_HOST, AWS_EC2_USER, AWS_EC2_SSH_PRIVATE_KEY, AWS_DEPLOY_PATH
# (Backward compatible fallback: ORACLE_VM_IP, ORACLE_VM_USER, ORACLE_SSH_PRIVATE_KEY, DEPLOY_PATH)
# Optional env sync for Google integration and frontend build:
# GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GOOGLE_REDIRECT_URI, GOOGLE_SCOPES
# FRONTEND_API_BASE_URL, FRONTEND_URL
# Optional for HTTPS automation:
# DOMAIN, CERTBOT_EMAIL
